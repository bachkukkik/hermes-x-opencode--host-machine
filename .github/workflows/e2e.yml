name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install bats and Python dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bats
          pip3 install --user pyyaml

      - name: Create .env fixture
        run: |
          cp .env.example .env
          # Override with mock values for CI (no real LiteLLM proxy available)
          cat >> .env << 'EOF'
          OPENAI_API_KEY=mock-key
          OPENAI_BASE_URL=http://localhost:4000
          OPENAI_DEFAULT_MODEL=mock-model
          OPENCODE_ZEN_API_KEY=mock-zen-key
          EOF

      - name: Start mock LLM server
        run: |
          bash tests/mock-llm-server.sh &
          sleep 2
          curl -sf http://localhost:4000/health

      - name: Run generate.sh --dry-run
        run: bash generate.sh --dry-run

      - name: Run bats e2e tests
        run: bats tests/e2e/

      - name: Stop mock LLM server
        if: always()
        run: kill %1 2>/dev/null || true
