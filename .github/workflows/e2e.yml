name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install bats and Python dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bats
          pip3 install --user pyyaml

      - name: Create .env fixture
        run: |
          cp .env.example .env
          # Override with mock values for CI (no real LiteLLM proxy available)
          cat >> .env << 'EOF'
          OPENAI_API_KEY=mock-key
          OPENAI_BASE_URL=http://localhost:4000
          OPENAI_DEFAULT_MODEL=mock-model
          OPENCODE_ZEN_API_KEY=mock-zen-key
          EOF

      - name: Seed live config fixtures
        run: |
          # opencode.jsonc: minimal fixture so TC8 (preserved blocks) passes
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/opencode.jsonc << 'EOF'
          {
            "permission": { "read": { "*": "allow" } },
            "plugin": ["example-plugin"],
            "agent": {}
          }
          EOF
          # config.yaml: minimal fixture so model-discovery reads api_key
          mkdir -p ~/.hermes
          cat > ~/.hermes/config.yaml << 'EOF'
          custom_providers:
            - name: litellm
              api_key: mock-key
          EOF

      - name: Install to staging directory
        run: bash install.sh --no-run

      - name: Start mock LLM server (3+ models for TC3)
        run: |
          export MOCK_MODELS='[{"id":"zai/glm-5.2"},{"id":"openai/gpt-4o"},{"id":"anthropic/claude-sonnet-4.6"}]'
          # Wait for mock server and health check
          bash tests/mock-llm-server.sh &
          sleep 2
          curl -sf http://localhost:4000/health

      - name: Run generate.sh --dry-run
        run: |
          cd ~/.hermes/host-config-gen
          bash generate.sh --dry-run

      - name: Run bats e2e tests
        run: bats tests/e2e/

      - name: Stop mock LLM server
        if: always()
        run: kill %1 2>/dev/null || true
